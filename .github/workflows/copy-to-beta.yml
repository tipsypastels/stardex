name: Mirror to Beta Preview

on:
  push:
    branches: "rewrite"
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: tipsypastels/stardex
          path: ./this
          ref: rewrite

      - name: Checkout beta
        uses: actions/checkout@v5
        with:
          repository: tipsypastels/stardex-beta-preview
          path: ./beta

      - name: Copy repository
        run: |
          mkdir -p ./beta/x
          cp -a ./this/. ./beta/x
          rm -rf ./beta/x/.git

      - name: Commit to beta
        run: |
          cd beta
          git add .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -am "Push to beta."
          git remote set-url origin https://tipsypastels:${{ secrets.COPY_TO_BETA_PAT }}@github.com/tipsypastels/stardex-beta-preview.git
          git push -u origin main
